<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repertorio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; min-height:100%; font-family:"Inter","Segoe UI",sans-serif; color:white; background:#080c14; overflow-x:hidden; }
    body { background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(99,102,241,.22),transparent), radial-gradient(ellipse 60% 40% at 90% 60%,rgba(236,72,153,.12),transparent), linear-gradient(180deg,#0f1320 0%,#080c14 100%); }
    .header { position:fixed; top:0; width:100%; z-index:1000; background:rgba(8,12,20,.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,.07); }
    .header-inner { max-width:960px; margin:auto; padding:18px 20px 14px; transition:all .35s; }
    .header.compact .header-inner { padding:8px 16px; }
    h1 { text-align:center; margin:0 0 2px; font-size:26px; font-weight:900; background:linear-gradient(135deg,#fff 0%,#a5b4fc 50%,#f0abfc 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .header.compact h1 { font-size:17px; }
    .subtitle { text-align:center; margin:0 0 14px; font-size:11px; color:rgba(255,255,255,.45); letter-spacing:1.5px; text-transform:uppercase; }
    .header.compact .subtitle { display:none; }
    .search-wrap { position:relative; }
    .search-wrap::before { content:"🔍"; position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; }
    #search { width:100%; padding:13px 16px 13px 42px; border-radius:999px; border:1px solid rgba(255,255,255,.08); outline:none; background:rgba(255,255,255,.06); color:white; font-size:14px; font-family:"Inter",sans-serif; }
    #search::placeholder { color:rgba(255,255,255,.35); }
    .filters { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .filter-btn { flex:1; min-width:90px; padding:10px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.05); color:rgba(255,255,255,.7); cursor:pointer; font-weight:700; font-size:13px; font-family:"Inter",sans-serif; }
    .filter-btn.active { background:linear-gradient(135deg,#6366f1,#8b5cf6); border-color:transparent; color:white; }
    .filter-btn.active-slow { background:linear-gradient(135deg,#ec4899,#a855f7); border-color:transparent; color:white; }
    .filter-btn.active-fast { background:linear-gradient(135deg,#f59e0b,#ef4444); border-color:transparent; color:white; }
    .container { max-width:960px; margin:auto; padding:16px 16px 60px; padding-top:195px; }
    .stats-bar { display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; }
    .stat-chip { padding:8px 16px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); font-size:13px; font-weight:600; color:rgba(255,255,255,.6); }
    .stat-chip span { color:white; font-weight:800; }
    .section-header { display:flex; align-items:center; gap:10px; margin:28px 0 14px; }
    .section-label-btn { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:6px 14px; border-radius:999px; cursor:pointer; font-family:"Inter",sans-serif; border:1px solid transparent; white-space:nowrap; }
    .slow-btn { background:rgba(236,72,153,.15); color:#f9a8d4; border-color:rgba(236,72,153,.3); }
    .fast-btn { background:rgba(245,158,11,.15); color:#fcd34d; border-color:rgba(245,158,11,.3); }
    .section-line { flex:1; height:1px; background:rgba(255,255,255,.06); }
    .section-count { font-size:11px; color:rgba(255,255,255,.3); font-weight:600; }
    .cards { display:grid; gap:10px; }
    .card { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); overflow:hidden; }
    .thumb { width:80px; min-width:80px; height:54px; border-radius:10px; object-fit:cover; flex-shrink:0; display:block; }
    .thumb-placeholder { width:80px; min-width:80px; height:54px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1e2535,#2d3748); }
    .info { flex:1; min-width:0; width:0; overflow:hidden; }
    .song-title { font-weight:700; font-size:14px; margin-bottom:6px; color:#f1f5f9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sub { font-size:12px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .playlist-pill { display:inline-flex; align-items:center; font-size:11px; padding:4px 11px; border-radius:999px; font-weight:700; cursor:pointer; font-family:"Inter",sans-serif; border:1px solid transparent; }
    .slow-pill { background:rgba(236,72,153,.18); color:#fbcfe8; border-color:rgba(236,72,153,.28); }
    .fast-pill { background:rgba(245,158,11,.18); color:#fde68a; border-color:rgba(245,158,11,.28); }
    button.play { background:linear-gradient(135deg,#e01d1d,#171718); border:none; width:40px; min-width:40px; height:40px; border-radius:50%; color:white; cursor:pointer; font-size:14px; font-weight:700; flex-shrink:0; flex-grow:0; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(224,29,29,.4); }
    button.play.disabled { background:rgba(255,255,255,.07); color:rgba(255,255,255,.28); cursor:not-allowed; box-shadow:none; }
    .empty { text-align:center; padding:50px 16px; color:rgba(255,255,255,.45); }

    @media (max-width: 640px) {
      .container { padding-top: 210px; }
      .thumb { width: 52px; min-width: 52px; height: 37px; border-radius: 7px; }
      .thumb-placeholder { width: 52px; min-width: 52px; height: 37px; border-radius: 7px; }
      .song-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .filter-btn { min-width: calc(50% - 4px); font-size: 12px; }
      .card { gap: 7px; padding: 8px 8px; }
      button.play { width: 34px; min-width: 34px; height: 34px; font-size: 12px; flex-shrink: 0; }
      .playlist-pill { font-size: 10px; padding: 3px 7px; }
      .info { min-width: 0; width: 0; flex: 1; }
    }
  </style>
</head>
<body>
  <div class="header" id="header">
    <div class="header-inner">
      <h1>Repertorio</h1>
      <p class="subtitle">Campamento · Canciones</p>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Buscar canción..." onkeyup="applyFilters()" />
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this,'')">Todas</button>
        <button class="filter-btn" onclick="setFilter('lenta',this,'active-slow')"><img src="mate.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;object-fit:contain;"> Lentas</button>
        <button class="filter-btn" onclick="setFilter('rapida',this,'active-fast')"><img src="mc.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;object-fit:contain;"> Rápidas</button>
      </div>
    </div>
  </div>

  <div class="container"><div id="list"></div></div>

  <script>
    const playlists = {
      lenta:  "https://music.youtube.com/playlist?list=PLeRRgQarQRwqydLUxuadT8b6cs_YAwtLd&si=DreBBMDQd6lDsEuy",
      rapida: "https://music.youtube.com/playlist?list=PLeRRgQarQRwrM1NQ02POElqtrt3UN2k6x&si=356IPXN_V50xE8wY"
    };
    const songs = [
      { name:"Quien Dices Que Soy",                     tipo:"lenta",  link:"https://www.youtube.com/watch?v=ZYFzPkANmXk" },
      { name:"Dame a Cristo",                           tipo:"lenta",  link:"https://www.youtube.com/watch?v=n-uoCeB-WCg" },
      { name:"Deseable",                                tipo:"lenta",  link:"https://www.youtube.com/watch?v=mkMWflyvhzw" },
      { name:"Los Brazos de Papá",                      tipo:"lenta",  link:"https://www.youtube.com/watch?v=BGDOdMpTV2o" },
      { name:"Desde Mi Interior",                       tipo:"lenta",  link:"https://www.youtube.com/watch?v=pORjEfnPALk" },
      { name:"Es Él / Nuestra Prioridad",               tipo:"lenta",  link:"https://www.youtube.com/watch?v=GmKYb7nl8rM" },
      { name:"Mover Tu Corazón",                        tipo:"lenta",  link:"https://www.youtube.com/watch?v=36udEk2LxuA" },
      { name:"Yo Te Amo",                               tipo:"lenta",  link:"https://www.youtube.com/watch?v=whB-i-WzaT4" },
      { name:"Hermoso Nombre",                          tipo:"lenta",  link:"https://www.youtube.com/watch?v=ZoKsBeoEW18" },
      { name:"Vasijas Rotas",                           tipo:"lenta",  link:"https://www.youtube.com/watch?v=6GDgPh_ilEM" },
      { name:"Cristo yo te amo + Es Él",                tipo:"lenta",  link:"https://www.youtube.com/watch?v=oLD7RC9YFtg" },
      { name:"Entre Las Llamas / Hermoso Nombre puente",tipo:"lenta",  link:"https://www.youtube.com/watch?v=MfuKzJFwl_k" },
      { name:"De tumbas a jardines",                    tipo:"lenta",  link:"https://www.youtube.com/watch?v=83l5uaVEbFs" },
      { name:"Tu Amor No Tiene Fin",                    tipo:"lenta",  link:"https://www.youtube.com/watch?v=1hPCABGSHk4" },
      { name:"Quien más es digno",                      tipo:"lenta", link:"https://www.youtube.com/watch?v=niavhjpZJqA" },
      { name:"En Tu Luz",                               tipo:"rapida", link:"https://www.youtube.com/watch?v=Wibcq_r0TlQ" },
      { name:"Correré",                                 tipo:"rapida", link:"https://www.youtube.com/watch?v=BY51wjW6gbg" },
      { name:"Vida Tu Me Das",                          tipo:"rapida", link:"https://www.youtube.com/watch?v=QSchFaoTipk" },
      { name:"A Danzar",                                tipo:"rapida", link:"https://www.youtube.com/watch?v=W9tUnz5dvXg" },
      { name:"Dios No Está Muerto",                     tipo:"rapida", link:"https://www.youtube.com/watch?v=S_OTz-lpDjw" },
      { name:"Vivo Estás",                              tipo:"rapida", link:"https://www.youtube.com/watch?v=0kit8qrfwBA" },
      { name:"Es Tiempo",                               tipo:"rapida", link:"https://www.youtube.com/watch?v=OZzCl21qM-s" },
      { name:"Tómalo",                                  tipo:"rapida", link:"https://www.youtube.com/watch?v=V-7bb6ir8ro" },
      { name:"Somos Libres",                            tipo:"rapida", link:"https://www.youtube.com/watch?v=_wiXgfg5heQ" },
      { name:"Generación que Danza",                    tipo:"rapida", link:"https://www.youtube.com/watch?v=2WZjGOi73qY" },
      { name:"Mi Gozo",                                 tipo:"rapida", link:"https://www.youtube.com/watch?v=IxD3JiOo9DY" },
      { name:"Dios Es Amor",                            tipo:"rapida", link:"https://www.youtube.com/watch?v=NyiR9jpZEgA" },
      { name:"Soy Libre Hillsong",                      tipo:"rapida", link:"https://www.youtube.com/watch?v=UgJsSzRk_sk" },
      { name:"Lavado",                                  tipo:"rapida", link:"https://www.youtube.com/watch?v=C75PF1pOM40" },
      { name:"Adiós al Ayer",                           tipo:"rapida", link:"https://www.youtube.com/watch?v=CQb8HhAn1LU" },
      { name:"Libre Soy Scarpeta",                      tipo:"rapida", link:"https://www.youtube.com/watch?v=Koz_iMvlGzM" },
      { name:"Loco Rescate",                            tipo:"rapida", link:"https://www.youtube.com/watch?v=noG5STmlX38" },
      { name:"Glorioso Día",                            tipo:"rapida", link:"https://www.youtube.com/watch?v=bhPdS_ZUKg8" },
    ];
    let currentFilter = "all";
    window.addEventListener("scroll", () => {
      document.getElementById("header").classList.toggle("compact", window.scrollY > 40);
    });
    function getYouTubeID(url) {
      if (!url) return null;
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }
    function thumb(url) {
      const id = getYouTubeID(url);
      return id ? "https://img.youtube.com/vi/" + id + "/hqdefault.jpg" : "";
    }
    function card(song, index) {
      const hasLink = !!song.link;
      const image = thumb(song.link);
      const playlistUrl = song.tipo === "lenta" ? playlists.lenta : playlists.rapida;
      const imgSrc = song.tipo === "lenta" ? "mate.png" : "mc.png";
      const typeTag = song.tipo === "lenta"
        ? `<button onclick="event.stopPropagation();window.open('${playlistUrl}','_blank')" class="playlist-pill slow-pill"><img src="mate.png" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;object-fit:contain;">Lenta</button>`
        : `<button onclick="event.stopPropagation();window.open('${playlistUrl}','_blank')" class="playlist-pill fast-pill"><img src="mc.png" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;object-fit:contain;">Rápida</button>`;
      const thumbHtml = image
        ? `<img class="thumb" src="${image}" alt="${song.name}" loading="lazy">`
        : `<div class="thumb-placeholder"><img src="${imgSrc}" style="width:28px;height:28px;object-fit:contain;opacity:0.6;"></div>`;
      return `
        <div class="card" style="animation-delay:${(index-1)*0.04}s">
          ${thumbHtml}
          <div class="info">
            <div class="song-title">${song.name}</div>
            <div class="sub">${typeTag}</div>
          </div>
          <button class="play ${!hasLink ? 'disabled' : ''}"
            ${hasLink ? `onclick="window.open('${song.link}','_blank')"` : 'disabled'}>&#9654;</button>
        </div>`;
    }
    function render() {
      const list = document.getElementById("list");
      const text = document.getElementById("search").value.trim().toLowerCase();
      let filtered = songs.filter(s => s.name.toLowerCase().includes(text));
      if (currentFilter !== "all") filtered = filtered.filter(s => s.tipo === currentFilter);
      const lentas  = filtered.filter(s => s.tipo==="lenta").sort((a,b)=>a.name.localeCompare(b.name,"es"));
      const rapidas = filtered.filter(s => s.tipo==="rapida").sort((a,b)=>a.name.localeCompare(b.name,"es"));
      let html = `<div class="stats-bar">
        <div class="stat-chip">Total <span>${filtered.length}</span></div>
        <div class="stat-chip"><img src="mate.png" style="width:14px;height:14px;vertical-align:middle;margin-right:5px;object-fit:contain;">Lentas <span>${lentas.length}</span></div>
        <div class="stat-chip"><img src="mc.png" style="width:14px;height:14px;vertical-align:middle;margin-right:5px;object-fit:contain;">Rápidas <span>${rapidas.length}</span></div>
      </div>`;
      if (lentas.length > 0) {
        html += `<div class="section-header">
          <button onclick="window.open(playlists.lenta,'_blank')" class="section-label-btn slow-btn">
            <img src="mate.png" style="width:16px;height:16px;object-fit:contain;"> Lentas
            <span style="font-size:10px;opacity:.7;margin-left:4px;">&#8599;</span>
          </button>
          <div class="section-line"></div>
          <span class="section-count">${lentas.length} canciones</span>
        </div>
        <div class="cards">${lentas.map((s,i)=>card(s,i+1)).join("")}</div>`;
      }
      if (rapidas.length > 0) {
        html += `<div class="section-header">
          <button onclick="window.open(playlists.rapida,'_blank')" class="section-label-btn fast-btn">
            <img src="mc.png" style="width:16px;height:16px;object-fit:contain;"> Rápidas
            <span style="font-size:10px;opacity:.7;margin-left:4px;">&#8599;</span>
          </button>
          <div class="section-line"></div>
          <span class="section-count">${rapidas.length} canciones</span>
        </div>
        <div class="cards">${rapidas.map((s,i)=>card(s,i+1)).join("")}</div>`;
      }
      if (!filtered.length) {
        html = `<div class="empty">No encontré canciones con esa búsqueda.</div>`;
      }
      list.innerHTML = html;
    }
    function applyFilters() { render(); }
    function setFilter(type, btn, activeClass) {
      currentFilter = type;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active","active-slow","active-fast"));
      btn.classList.add(activeClass || "active");
      render();
    }
    render();
  </script>
</body>
</html>
