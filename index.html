<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎶 Repertorio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      min-height: 100%;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: white;
      background: #080c14;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.22), transparent),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(236,72,153,0.12), transparent),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(34,197,94,0.08), transparent),
        linear-gradient(180deg, #0f1320 0%, #080c14 100%);
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    .header-inner {
      max-width: 960px; margin: auto;
      padding: 18px 20px 14px;
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    .header.compact .header-inner { padding: 8px 16px; }

    h1 {
      text-align: center; margin: 0 0 2px;
      font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 50%, #f0abfc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; transition: 0.35s;
    }

    .header.compact h1 { font-size: 17px; }

    .subtitle {
      text-align: center; margin: 0 0 14px;
      font-size: 11px; color: rgba(255,255,255,0.45);
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    .header.compact .subtitle { display: none; }

    /* ===== SEARCH ===== */
    .search-wrap { position: relative; }

    .search-wrap::before {
      content: '🔍'; position: absolute;
      left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }

    #search {
      width: 100%; padding: 13px 16px 13px 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      outline: none;
      background: rgba(255,255,255,0.06);
      color: white; font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s;
    }

    #search:focus {
      border-color: rgba(165,180,252,0.45);
      background: rgba(255,255,255,0.09);
    }

    #search::placeholder { color: rgba(255,255,255,0.35); }

    /* ===== FILTERS ===== */
    .filters {
      display: flex; gap: 8px;
      margin-top: 12px; flex-wrap: wrap;
    }

    .filter-btn {
      flex: 1; min-width: 90px;
      padding: 10px 12px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      font-weight: 700; font-size: 13px;
      font-family: 'Inter', sans-serif;
    }

    .filter-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.09);
      color: white;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-color: transparent; color: white;
      box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    .filter-btn.active-slow {
      background: linear-gradient(135deg, #ec4899, #a855f7);
      border-color: transparent; color: white;
      box-shadow: 0 6px 20px rgba(236,72,153,0.38);
    }

    .filter-btn.active-fast {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-color: transparent; color: white;
      box-shadow: 0 6px 20px rgba(245,158,11,0.38);
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 960px; margin: auto;
      padding: 16px 16px 60px;
      padding-top: 195px;
      position: relative; z-index: 1;
    }

    /* ===== STATS ===== */
    .stats-bar {
      display: flex; gap: 10px;
      margin-bottom: 22px; flex-wrap: wrap;
    }

    .stat-chip {
      padding: 8px 16px; border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.6);
    }

    .stat-chip span { color: white; font-weight: 800; }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex; align-items: center;
      gap: 10px; margin: 28px 0 14px;
    }

    .section-label-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 800;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 999px;
      cursor: pointer; font-family: 'Inter', sans-serif;
      border: 1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
    }

    .section-label-btn:hover {
      transform: translateY(-2px) scale(1.04);
      filter: brightness(1.15);
    }

    .slow-btn {
      background: rgba(236,72,153,0.15); color: #f9a8d4;
      border-color: rgba(236,72,153,0.3);
      box-shadow: 0 2px 10px rgba(236,72,153,0.18);
    }

    .slow-btn:hover { box-shadow: 0 4px 18px rgba(236,72,153,0.35); }

    .fast-btn {
      background: rgba(245,158,11,0.15); color: #fcd34d;
      border-color: rgba(245,158,11,0.3);
      box-shadow: 0 2px 10px rgba(245,158,11,0.18);
    }

    .fast-btn:hover { box-shadow: 0 4px 18px rgba(245,158,11,0.35); }

    .section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
    .section-count { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; }

    /* ===== CARDS ===== */
    .cards { display: grid; gap: 10px; }

    .card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px; border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1),
                  background 0.22s ease, box-shadow 0.22s ease;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .thumb, .thumb-placeholder {
      width: 90px; height: 60px;
      border-radius: 12px; object-fit: cover;
      flex-shrink: 0; display: block;
    }

    .thumb-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e2535, #2d3748);
      font-size: 24px;
    }

    .info { flex: 1; min-width: 0; }

    .song-title {
      font-weight: 700; font-size: 15px;
      margin-bottom: 7px; color: #f1f5f9;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .sub {
      font-size: 12px; display: flex;
      gap: 6px; flex-wrap: wrap; align-items: center;
    }

    .badge {
      font-size: 11px; padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
    }

    .badge.tone {
      background: rgba(99,102,241,0.18); color: #c7d2fe;
      border-color: rgba(99,102,241,0.22);
    }

    .badge.slow-tag {
      background: rgba(236,72,153,0.14); color: #fbcfe8;
      border-color: rgba(236,72,153,0.18);
    }

    .badge.fast-tag {
      background: rgba(245,158,11,0.14); color: #fde68a;
      border-color: rgba(245,158,11,0.18);
    }

    .playlist-pill {
      display: inline-flex; align-items: center;
      font-size: 11px; padding: 4px 11px;
      border-radius: 999px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border: 1px solid transparent;
    }

    .playlist-pill:hover {
      transform: scale(1.07);
    }

    .slow-pill {
      background: rgba(236,72,153,0.18); color: #fbcfe8;
      border-color: rgba(236,72,153,0.28);
      box-shadow: 0 2px 8px rgba(236,72,153,0.2);
    }

    .slow-pill:hover {
      background: rgba(236,72,153,0.32);
      box-shadow: 0 4px 14px rgba(236,72,153,0.38);
    }

    .fast-pill {
      background: rgba(245,158,11,0.18); color: #fde68a;
      border-color: rgba(245,158,11,0.28);
      box-shadow: 0 2px 8px rgba(245,158,11,0.2);
    }

    .fast-pill:hover {
      background: rgba(245,158,11,0.32);
      box-shadow: 0 4px 14px rgba(245,158,11,0.38);
    }

    button.play {
      background: linear-gradient(135deg, #e01d1d, #171718);
      border: none; width: 42px; height: 42px;
      border-radius: 50%; color: white;
      cursor: pointer; font-size: 14px; font-weight: 700;
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }

    button.play:hover {
      transform: scale(1.12);
      box-shadow: 0 6px 22px rgba(99,102,241,0.58);
    }

    button.play.disabled {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.28);
      cursor: not-allowed; box-shadow: none;
    }

    /* ===== EMPTY ===== */
    .empty {
      text-align: center; padding: 50px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.45); font-size: 15px;
    }

    .empty-icon { font-size: 42px; margin-bottom: 12px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .container { padding-top: 210px; }
      .thumb, .thumb-placeholder { width: 64px; height: 48px; border-radius: 10px; }
      .song-title { font-size: 13px; }
      .filter-btn { min-width: calc(50% - 4px); font-size: 12px; }
      .card { gap: 10px; padding: 10px; }
      .info { min-width: 0; }
      button.play { width: 36px; height: 36px; font-size: 12px; flex-shrink: 0; }
      .playlist-pill { font-size: 10px; padding: 3px 8px; }
    }
  </style>
</head>
<body>

  <div class="header" id="header">
    <div class="header-inner">
      <h1>Repertorio</h1>
      <p class="subtitle">Campamento · Canciones</p>

      <div class="search-wrap">
        <input id="search" type="text" placeholder="Buscar canción..." onkeyup="applyFilters()" />
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this, '')">Todas</button>
        <button class="filter-btn" onclick="setFilter('lenta', this, 'active-slow')"><img src="mate.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;object-fit:contain;"> Lentas</button>
        <button class="filter-btn" onclick="setFilter('rapida', this, 'active-fast')"><img src="mc.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;object-fit:contain;"> Rápidas</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="list"></div>
  </div>

  <script>
    const playlists = {
      lenta: "https://music.youtube.com/playlist?list=PLeRRgQarQRwqydLUxuadT8b6cs_YAwtLd&si=DreBBMDQd6lDsEuy",
      rapida: "https://music.youtube.com/playlist?list=PLeRRgQarQRwrM1NQ02POElqtrt3UN2k6x&si=356IPXN_V50xE8wY"
    };

    const songs = [
      // ===== LENTAS =====
      { name: "Quien Dices Que Soy",             tone: "Original", tipo: "lenta",  link: "https://www.youtube.com/watch?v=ZYFzPkANmXk" },
      { name: "Dame a Cristo",                   tone: "C",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=n-uoCeB-WCg" },
      { name: "Deseable",                        tone: "A",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=mkMWflyvhzw" },
      { name: "Los Brazos de Papá",              tone: "C",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=BGDOdMpTV2o" },
      { name: "Desde Mi Interior",               tone: "Original", tipo: "lenta",  link: "https://www.youtube.com/watch?v=pORjEfnPALk" },
      { name: "Es Él / Nuestra Prioridad",       tone: "A",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=GmKYb7nl8rM" },
      { name: "Mover Tu Corazón",                tone: "A",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=36udEk2LxuA" },
      { name: "Yo Te Amo",                       tone: "C",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=whB-i-WzaT4" },
      { name: "Hermoso Nombre",                  tone: "C",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=ZoKsBeoEW18" },
      { name: "Vasijas Rotas",                   tone: "C",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=6GDgPh_ilEM" },
      { name: "Cristo yo te amo + Es Él",        tone: "?",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=oLD7RC9YFtg" },
      { name: "Entre Las Llamas / Hermoso Nombre puente", tone: "Original", tipo: "lenta", link: "https://www.youtube.com/watch?v=MfuKzJFwl_k" },
      { name: "De tumbas a jardines",            tone: "G",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=83l5uaVEbFs" },
      { name: "Tu Amor No Tiene Fin",            tone: "?",        tipo: "lenta",  link: "https://www.youtube.com/watch?v=1hPCABGSHk4" },
      { name: "Quien más es digno",              tone: "G",        tipo: "rapida", link: "https://www.youtube.com/watch?v=niavhjpZJqA" },


      // ===== RÁPIDAS =====
      { name: "En Tu Luz",                       tone: "C",        tipo: "rapida", link: "https://www.youtube.com/watch?v=Wibcq_r0TlQ" },
      { name: "Correré",                         tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=BY51wjW6gbg" },
      { name: "Vida Tu Me Das",                  tone: "Sheyla",   tipo: "rapida", link: "https://www.youtube.com/watch?v=QSchFaoTipk" },
      { name: "A Danzar",                        tone: "D o Bm",   tipo: "rapida", link: "https://www.youtube.com/watch?v=W9tUnz5dvXg" },
      { name: "Dios No Está Muerto",             tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=S_OTz-lpDjw" },
      { name: "Vivo Estás",                      tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=0kit8qrfwBA&list=RD0kit8qrfwBA&start_radio=1" },
      { name: "Es Tiempo",                       tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=OZzCl21qM-s" },
      { name: "Tómalo",                          tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=V-7bb6ir8ro" },
      { name: "Somos Libres",                    tone: "G",        tipo: "rapida", link: "https://www.youtube.com/watch?v=_wiXgfg5heQ" },
      { name: "Generación que Danza",            tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=2WZjGOi73qY" },
      { name: "Mi Gozo",                         tone: "D",        tipo: "rapida", link: "https://www.youtube.com/watch?v=IxD3JiOo9DY" },
      { name: "Dios Es Amor",                    tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=NyiR9jpZEgA" },
      { name: "Soy Libre Hillsong",              tone: "Em",       tipo: "rapida", link: "https://www.youtube.com/watch?v=UgJsSzRk_sk" },
      { name: "Lavado",                          tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=C75PF1pOM40" },
      { name: "Adiós al Ayer",                   tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=CQb8HhAn1LU" },
      { name: "Libre Soy Scarpeta",              tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=Koz_iMvlGzM" },
      { name: "Loco Rescate",                    tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=noG5STmlX38" },
      { name: "Glorioso Día",                    tone: "Original", tipo: "rapida", link: "https://www.youtube.com/watch?v=bhPdS_ZUKg8" },
    ];

    let currentFilter = "all";

    window.addEventListener("scroll", () => {
      document.getElementById("header").classList.toggle("compact", window.scrollY > 40);
    });

    function getYouTubeID(url) {
      if (!url) return null;
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function thumb(url) {
      const id = getYouTubeID(url);
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";
    }

    function card(song, index) {
      const hasLink = !!song.link;
      const image = thumb(song.link);
      const playlistUrl = song.tipo === "lenta" ? playlists.lenta : playlists.rapida;
      const typeTag = song.tipo === "lenta"
        ? `<button onclick="event.stopPropagation();window.open('${playlistUrl}','_blank')" class="playlist-pill slow-pill"><img src="mate.png" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;object-fit:contain;">Lenta</button>`
        : `<button onclick="event.stopPropagation();window.open('${playlistUrl}','_blank')" class="playlist-pill fast-pill"><img src="mc.png" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;object-fit:contain;">Rápida</button>`;

      return `
        <div class="card" style="animation-delay:${(index-1)*0.04}s">
          ${image
            ? `<img class="thumb" src="${image}" alt="${song.name}" loading="lazy">`
            : `<div class="thumb-placeholder"><img src="${song.tipo === 'lenta' ? 'mate.png' : 'mc.png'}" style="width:32px;height:32px;object-fit:contain;opacity:0.6;"></div>`}
          <div class="info">
            <div class="song-title">${song.name}</div>
            <div class="sub">
              ${typeTag}
            </div>
          </div>
          <button class="play ${!hasLink ? 'disabled' : ''}"
            onclick="${hasLink ? `window.open('${song.link}','_blank')` : ''}"
            ${!hasLink ? 'disabled' : ''}>▶</button>
        </div>`;
    }

    function render() {
      const list = document.getElementById("list");
      const text = document.getElementById("search").value.trim().toLowerCase();

      let filtered = songs.filter(s =>
        (s.name || "").toLowerCase().includes(text)
      );

      if (currentFilter !== "all") {
        filtered = filtered.filter(s => s.tipo === currentFilter);
      }

      const lentas  = filtered.filter(s => s.tipo === "lenta").sort((a,b) => a.name.localeCompare(b.name, 'es'));
      const rapidas = filtered.filter(s => s.tipo === "rapida").sort((a,b) => a.name.localeCompare(b.name, 'es'));

      let html = "";

      // Stats bar
      html += `<div class="stats-bar">
        <div class="stat-chip">Total <span>${filtered.length}</span></div>
        <div class="stat-chip"><img src="mate.png" style="width:14px;height:14px;vertical-align:middle;margin-right:5px;object-fit:contain;">Lentas <span>${lentas.length}</span></div>
        <div class="stat-chip"><img src="mc.png" style="width:14px;height:14px;vertical-align:middle;margin-right:5px;object-fit:contain;">Rápidas <span>${rapidas.length}</span></div>
      </div>`;

      if (lentas.length > 0) {
        html += `<div class="section-header">
          <button onclick="window.open(playlists.lenta, '_blank')" class="section-label-btn slow-btn">
            <img src="mate.png" style="width:16px;height:16px;object-fit:contain;"> Lentas
            <span style="font-size:10px;opacity:0.7;margin-left:4px;">↗</span>
          </button>
          <div class="section-line"></div>
          <span class="section-count">${lentas.length} canciones</span>
        </div>
        <div class="cards">${lentas.map((s,i) => card(s, i+1)).join("")}</div>`;
      }

      if (rapidas.length > 0) {
        html += `<div class="section-header">
          <button onclick="window.open(playlists.rapida, '_blank')" class="section-label-btn fast-btn">
            <img src="mc.png" style="width:16px;height:16px;object-fit:contain;"> Rápidas
            <span style="font-size:10px;opacity:0.7;margin-left:4px;">↗</span>
          </button>
          <div class="section-line"></div>
          <span class="section-count">${rapidas.length} canciones</span>
        </div>
        <div class="cards">${rapidas.map((s,i) => card(s, i+1)).join("")}</div>`;
      }

      if (!filtered.length) {
        html = `<div class="empty">
          <div class="empty-icon"><img src="mate.png" style="width:40px;height:40px;object-fit:contain;opacity:0.5;"></div>
          No encontré canciones con esa búsqueda.
        </div>`;
      }

      list.innerHTML = html;
    }

    function applyFilters() { render(); }

    function setFilter(type, btn, activeClass) {
      currentFilter = type;
      document.querySelectorAll(".filter-btn").forEach(b => {
